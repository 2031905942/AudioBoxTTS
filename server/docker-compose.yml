# IndexTTS2 云服务 Docker Compose 配置
#
# 使用方法：
# 1. 确保已安装 Docker 和 NVIDIA Container Toolkit
# 2. 将模型文件放到 checkpoints/ 目录
# 3. 运行: docker-compose up -d
# 4. 访问: http://localhost:8000/docs

services:
  tts-api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: indextts2-cloud
    ports:
      - "8000:8000"
    volumes:
      # 挂载模型目录（避免打包到镜像，方便更新）
      - ../checkpoints:/app/checkpoints:ro
      # HuggingFace/处理管线缓存（必须可写）
      - ./hf_cache:/app/hf_cache
      # 日志目录
      - ./logs:/app/logs
    environment:
      # GPU 配置
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      # API 认证（多个 Key 用逗号分隔）
      - TTS_API_KEYS=${TTS_API_KEYS:-}
      # 推理配置
      - TTS_USE_FP16=${TTS_USE_FP16:-false}
      - TTS_USE_CUDA_KERNEL=${TTS_USE_CUDA_KERNEL:-true}
      # 缓存目录（避免写入只读的 checkpoints）
      - TTS_HF_CACHE_DIR=${TTS_HF_CACHE_DIR:-hf_cache}
      # 队列配置
      - TTS_MAX_QUEUE_SIZE=${TTS_MAX_QUEUE_SIZE:-50}
      - TTS_REQUEST_TIMEOUT=${TTS_REQUEST_TIMEOUT:-300}
      # 日志级别
      - TTS_LOG_LEVEL=${TTS_LOG_LEVEL:-INFO}
    # Docker Compose（非 Swarm）推荐用 gpus 字段启用 GPU
    # 注：Windows 上需 Docker Desktop 使用 WSL2 后端，并安装支持 WSL 的 NVIDIA 驱动。
    gpus: all
    # Swarm 场景仍可使用 deploy.resources（docker stack deploy）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ready"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

